<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - The New Times</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <h2>⚙️ Admin Panel</h2>
            <nav>
                <a href="#" onclick="showSection('dashboard')" class="active">📊 Dashboard</a>
                <a href="#" onclick="showSection('newArticle')">✍️ Nuevo Artículo</a>
                <a href="#" onclick="showSection('manageArticles')">📝 Gestionar</a>
                <a href="#" onclick="showSection('settings')">⚙️ Configuración</a>
            </nav>
            <div class="admin-footer">
                <a href="index.html" target="_blank">Ver sitio web</a>
                <button onclick="logout()">Cerrar sesión</button>
            </div>
        </aside>

        <main class="admin-main">
            <!-- Dashboard -->
            <section id="dashboard" class="admin-section active">
                <h2>Dashboard</h2>
                <div class="stats">
                    <div class="stat-card">
                        <h3 id="totalArticles">0</h3>
                        <p>Artículos</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="totalViews">0</h3>
                        <p>Vistas totales</p>
                    </div>
                </div>
            </section>

            <!-- Nuevo Artículo -->
            <section id="newArticle" class="admin-section">
                <h2>Nuevo Artículo</h2>
                <form id="articleForm" onsubmit="saveArticle(event)">
                    <label>Título *</label>
                    <input type="text" id="title" required>

                    <div class="form-row">
                        <div>
                            <label>Categoría *</label>
                            <select id="category" required>
                                <option value="">Seleccionar</option>
                                <option value="politica">Política</option>
                                <option value="economia">Economía</option>
                                <option value="tecnologia">Tecnología</option>
                                <option value="cultura">Cultura</option>
                                <option value="deportes">Deportes</option>
                            </select>
                        </div>
                        <div>
                            <label>Autor</label>
                            <input type="text" id="author" value="Redacción">
                        </div>
                    </div>

                    <label>Subtítulo</label>
                    <input type="text" id="subtitle">

                    <label>Imagen principal</label>
                    <input type="file" id="mainImage" accept="image/*" onchange="previewImage(event)">
                    <img id="imagePreview" style="display:none; max-width:300px; margin-top:10px;">

                    <label>Contenido *</label>
                    <textarea id="content" rows="10" required></textarea>

                    <label>Archivos adjuntos</label>
                    <input type="file" id="attachments" multiple onchange="handleAttachments(event)">
                    <div id="attachmentsList"></div>

                    <div class="checks">
                        <label><input type="checkbox" id="isBreakingNews"> Noticia de última hora</label>
                        <label><input type="checkbox" id="isFeatured"> Destacar en portada</label>
                    </div>

                    <button type="submit" class="btn-primary">Publicar Artículo</button>
                </form>
            </section>

            <!-- Gestionar Artículos -->
            <section id="manageArticles" class="admin-section">
                <h2>Gestionar Artículos</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>Categoría</th>
                            <th>Fecha</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="articlesTableBody"></tbody>
                </table>
            </section>

            <!-- Configuración -->
            <section id="settings" class="admin-section">
                <h2>Configuración</h2>
                <form onsubmit="saveSettings(event)">
                    <label>Título del sitio</label>
                    <input type="text" id="siteTitle" value="The New Times">
                    <button type="submit" class="btn-primary">Guardar</button>
                </form>
            </section>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
